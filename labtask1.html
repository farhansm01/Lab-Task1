<!DOCTYPE html>

<html>

<head>
    <title>Confirmation Form</title>
</head>

<body>
    <form center action="">
        <h2>Confirmation Form</h2>
        <div>
            <label for="">Name</label>
            <input required type="text" name="" id="">
        </div>
        <br />
        <div>
            <label for="">Email</label>
            <input required type="email" name="" id="">
        </div>

        <br />
        <div>
            <label for="">Internship Type:</label>

            <input type="radio" name="" id="" value="remote">
            <label for="">Remote</label>

            <input type="radio" name="" id="" value="onsite">
            <label for="">Onsite</label>


        </div>
        <br />
        <div>
            <label for="">Duration</label>
            <select name="" id="" value="duration">

                <option value="">6 weeks</option>
                <option value="">3 months</option>
            </select>
        </div>
        <br />
        <div>
            <label for="">Skills</label>

            <br />
            <input type="checkbox">
            <label for="">Web Development</label>
            <br />
            <input type="checkbox">
            <label for="">Data Analyst</label>
            <br />
            <input type="checkbox">
            <label for="">Mobile Apps</label>
        </div>

        <br />
        <br />

        <button>Submit</button>


    </form>
</body>

</html>
